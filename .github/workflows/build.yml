name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Download NLTK data
      run: |
        python -c "import nltk; nltk.download('punkt'); nltk.download('wordnet'); nltk.download('omw-1.4'); nltk.download('stopwords')"
        # Move downloaded data to local folder for bundling
        mkdir nltk_data
        xcopy /E /I %USERPROFILE%\AppData\Roaming\nltk_data\* nltk_data\

    - name: Generate Dev Certificate (Fallback)
      run: |
        python scripts/generate_cert.py
      shell: bash

    - name: Build and Sign Windows Executable
      run: |
        python build.py --os windows
      env:
        CERT_PATH: ${{ secrets.CERT_PATH || 'certs/dev_certificate.pfx' }}
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD || '' }}

    - name: Verify Executable
      run: |
        ls -l dist/
        # Check if it's a valid PE file (on Windows runner, we can just check existence)
        if (Test-Path "dist/*.exe") { echo "EXE found" } else { exit 1 }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TravelMate-Windows-EXE
        path: dist/*.exe
